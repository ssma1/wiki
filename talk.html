    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArcDmBhon_3xLtksvF-9M54HP8bHj9hII",
            authDomain: "sosial2-440f4.firebaseapp.com",
            databaseURL: "https://sosial2-440f4-default-rtdb.firebaseio.com",
            projectId: "sosial2-440f4",
            storageBucket: "sosial2-440f4.firebasestorage.app",
            messagingSenderId: "365488411767",
            appId: "1:365488411767:web:55f9e4b2db543c2c8aa272",
            measurementId: "G-0X53TXRXW9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const container = document.getElementById('appContainer');
        const menuToggle = document.getElementById('menuToggle');
        const burgerMenu = document.getElementById('burgerMenu');
        const burgerOverlay = document.getElementById('burgerOverlay');
        const burgerClose = document.getElementById('burgerClose');
        const authStatusText = document.getElementById('authStatusText');
        const loginMenuText = document.getElementById('loginMenuText');
        const loginMenuBtn = document.getElementById('loginMenuBtn');
        const randomArticleBtn = document.getElementById('randomArticleBtn');
        const addArticleMenuBtn = document.getElementById('addArticleMenuBtn');
        const telegramLink = document.getElementById('telegramLink');

        function openMenu() { burgerMenu.classList.add('open'); burgerOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeMenu() { burgerMenu.classList.remove('open'); burgerOverlay.classList.remove('active'); document.body.style.overflow = ''; }
        menuToggle.addEventListener('click', openMenu);
        burgerClose.addEventListener('click', closeMenu);
        burgerOverlay.addEventListener('click', closeMenu);

        let currentUser = null;
        let currentUserRole = 'user';
        let currentUsername = '';
        let currentArticleId = null;
        let currentArticleData = null;
        let allTopics = [];
        let allMessages = {};

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        currentUserRole = doc.data().role || 'user';
                        currentUsername = doc.data().username || user.email.split('@')[0] || 'Пользователь';
                    } else {
                        currentUserRole = 'user';
                        currentUsername = user.email.split('@')[0] || 'Пользователь';
                    }
                    updateAuthUI();
                    const id = getArticleId();
                    if (id) { currentArticleId = id; loadTalk(id); }
                    else { container.innerHTML = '<div class="error-text">ID статьи не указан</div>'; }
                }).catch(() => {
                    currentUserRole = 'user';
                    currentUsername = user.email.split('@')[0] || 'Пользователь';
                    updateAuthUI();
                    const id = getArticleId();
                    if (id) { currentArticleId = id; loadTalk(id); }
                    else { container.innerHTML = '<div class="error-text">ID статьи не указан</div>'; }
                });
            } else {
                currentUserRole = 'user';
                currentUsername = '';
                updateAuthUI();
                const id = getArticleId();
                if (id) { currentArticleId = id; loadTalk(id); }
                else { container.innerHTML = '<div class="error-text">ID статьи не указан</div>'; }
            }
        });

        function updateAuthUI() {
            if (currentUser) {
                authStatusText.innerHTML = `<span class="user-email">${escapeHtml(currentUsername)}</span> (${currentUserRole === 'admin' ? 'админ' : 'пользователь'})<br><button class="logout-btn" id="logoutBtn">Выйти</button>`;
                loginMenuText.textContent = escapeHtml(currentUsername);
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        auth.signOut();
                        closeMenu();
                        window.location.href = '/';
                    });
                }
            } else {
                authStatusText.textContent = 'Вы не авторизованы';
                loginMenuText.textContent = 'Войти';
            }
        }

        loginMenuBtn.addEventListener('click', () => {
            closeMenu();
            if (currentUser) {
                window.location.href = '/profile?uid=' + currentUser.uid;
            } else {
                window.location.href = '/login';
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getArticleId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('articleId');
        }

        // ===== ПАРСИНГ ТЕГОВ ДЛЯ ОБСУЖДЕНИЯ =====
        function parseTags(text) {
            if (!text) return '';
            let html = escapeHtml(text);
            html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
            html = html.replace(/\[italic\](.*?)\[\/italic\]/g, '<i>$1</i>');
            html = html.replace(/__(.*?)__/g, '<u>$1</u>');
            html = html.replace(/\[color=([^\]]+)\](.*?)\[\/color\]/g, '<span style="color:$1">$2</span>');
            html = html.replace(/\[url=([^\]]+)\](.*?)\[\/url\]/g, '<a href="$1" target="_blank">$2</a>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Дата неизвестна';
            try {
                if (timestamp.toDate) {
                    return timestamp.toDate().toLocaleString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                } else if (typeof timestamp === 'string') {
                    return new Date(timestamp).toLocaleString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                } else {
                    return new Date(timestamp).toLocaleString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                }
            } catch {
                return 'Дата неизвестна';
            }
        }

        function formatDateShort(timestamp) {
            if (!timestamp) return 'давно';
            try {
                if (timestamp.toDate) {
                    const d = timestamp.toDate();
                    const now = new Date();
                    const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24 * 365));
                    if (diff >= 1) return diff + ' год' + (diff > 1 ? 'а' : '') + ' назад';
                    const diffMonths = Math.floor((now - d) / (1000 * 60 * 60 * 24 * 30));
                    if (diffMonths >= 1) return diffMonths + ' месяц' + (diffMonths > 1 ? 'а' : '') + ' назад';
                    const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
                    if (diffDays >= 1) return diffDays + ' дн' + (diffDays > 1 ? 'я' : 'ь') + ' назад';
                    const diffHours = Math.floor((now - d) / (1000 * 60 * 60));
                    if (diffHours >= 1) return diffHours + ' час' + (diffHours > 1 ? 'а' : '') + ' назад';
                    const diffMinutes = Math.floor((now - d) / (1000 * 60));
                    return diffMinutes + ' мин' + (diffMinutes > 1 ? 'уты' : 'ута') + ' назад';
                }
                return 'давно';
            } catch {
                return 'давно';
            }
        }

        // ===== ЗАГРУЗКА ОБСУЖДЕНИЯ =====
        function loadTalk(articleId) {
            container.innerHTML = '<div class="loading-text">Загрузка обсуждения...</div>';

            db.collection('articles').doc(articleId).get()
                .then(doc => {
                    if (!doc.exists) {
                        container.innerHTML = '<div class="error-text">Статья не найдена</div>';
                        return;
                    }
                    currentArticleData = { id: doc.id, ...doc.data() };
                    return loadTopics(articleId);
                })
                .catch(err => {
                    container.innerHTML = '<div class="error-text">Ошибка загрузки: ' + escapeHtml(err.message) + '</div>';
                    console.error(err);
                });
        }

        function loadTopics(articleId) {
            return db.collection('talkTopics')
                .where('articleId', '==', articleId)
                .orderBy('createdAt', 'desc')
                .get()
                .then(snapshot => {
                    allTopics = [];
                    snapshot.forEach(doc => {
                        allTopics.push({ id: doc.id, ...doc.data() });
                    });
                    return loadMessages(articleId);
                })
                .catch(err => {
                    console.error('Ошибка загрузки тем:', err);
                    return loadMessages(articleId);
                });
        }

        function loadMessages(articleId) {
            return db.collection('talkMessages')
                .where('articleId', '==', articleId)
                .orderBy('createdAt', 'asc')
                .get()
                .then(snapshot => {
                    allMessages = {};
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (!allMessages[data.topicId]) allMessages[data.topicId] = [];
                        allMessages[data.topicId].push({ id: doc.id, ...data });
                    });
                    renderTalk();
                })
                .catch(err => {
                    console.error('Ошибка загрузки сообщений:', err);
                    renderTalk();
                });
        }

        // ===== ОТОБРАЖЕНИЕ =====
        function renderTalk() {
            const article = currentArticleData;
            if (!article) {
                container.innerHTML = '<div class="error-text">Статья не найдена</div>';
                return;
            }

            const isProtected = article.protected || false;
            const isAdmin = currentUserRole === 'admin';
            const isAuthor = currentUser && article.authorId === currentUser.uid;
            const canEdit = isAdmin || isAuthor;

            let totalMessages = 0;
            allTopics.forEach(t => {
                totalMessages += (allMessages[t.id] || []).length;
            });

            let lastDate = null;
            let lastUser = '';
            allTopics.forEach(t => {
                const msgs = allMessages[t.id] || [];
                if (msgs.length > 0) {
                    const last = msgs[msgs.length - 1];
                    if (!lastDate || (last.createdAt && last.createdAt > lastDate)) {
                        lastDate = last.createdAt;
                        lastUser = last.username || 'Неизвестный';
                    }
                }
            });

            // Используем только существующие иконки
            const ICONS = {
                speechBubbles: 'https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/speechBubbles.svg',
                article: 'https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/article.svg',
                book: 'https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/book.svg',
                clock: 'https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/clock.svg',
                pin: 'https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/pin.svg',
                add: 'https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/add.svg'
            };

            let topicsHtml = '';
            if (allTopics.length === 0) {
                topicsHtml = `
                    <div class="talk-empty">
                        <span class="empty-icon">
                            <img src="${ICONS.speechBubbles}" alt="Обсуждение" style="width:48px;height:48px;filter:invert(0.4);">
                        </span>
                        <div class="empty-title">Обсуждение пусто</div>
                        <div class="empty-desc">Станьте первым, кто начнёт обсуждение этой статьи!</div>
                    </div>
                `;
            } else {
                allTopics.forEach(topic => {
                    const messages = allMessages[topic.id] || [];
                    const firstMsg = messages.length > 0 ? messages[0] : null;
                    const lastMsg = messages.length > 0 ? messages[messages.length - 1] : null;

                    let msgsHtml = '';
                    messages.forEach(msg => {
                        const isOwner = currentUser && msg.userId === currentUser.uid;
                        const canDelete = isAdmin || isOwner;
                        msgsHtml += `
                            <div class="talk-message" data-msg-id="${msg.id}">
                                <div class="msg-header">
                                    <span class="msg-user">${escapeHtml(msg.username || 'Неизвестный')} <span class="user-tag">${msg.userId === article.authorId ? '(автор)' : ''}</span></span>
                                    <span class="msg-date">${formatDate(msg.createdAt)}</span>
                                </div>
                                <div class="msg-content">${parseTags(msg.content)}</div>
                                ${canDelete ? `<div class="msg-actions"><button class="delete-msg" data-msg-id="${msg.id}">Удалить</button></div>` : ''}
                            </div>
                        `;
                    });

                    let replyForm = '';
                    if (currentUser) {
                        replyForm = `
                            <div class="talk-reply-form">
                                <textarea class="reply-textarea" placeholder="Напишите ответ... (можно использовать **жирный**, *курсив*, [color=red]цвет[/color])" rows="2"></textarea>
                                <div class="reply-actions">
                                    <button class="btn-submit reply-submit" data-topic-id="${topic.id}">Ответить</button>
                                    <button class="btn-cancel reply-cancel">Отмена</button>
                                </div>
                            </div>
                        `;
                    }

                    topicsHtml += `
                        <div class="talk-message" data-topic-id="${topic.id}">
                            <div class="msg-header">
                                <span class="msg-user" style="font-size:17px;">
                                    <img src="${ICONS.pin}" alt="Тема" style="width:16px;height:16px;filter:invert(0.3);vertical-align:middle;margin-right:4px;">
                                    ${escapeHtml(topic.title)}
                                </span>
                                <span class="msg-date">${firstMsg ? 'Автор: ' + escapeHtml(firstMsg.username || 'Неизвестный') : ''} • ${messages.length} сообщ${messages.length === 1 ? 'ение' : 'ения'}</span>
                            </div>
                            ${firstMsg ? `
                                <div class="msg-content" style="margin-top:6px;padding-left:6px;border-left:3px solid #eaecf0;padding-left:12px;">
                                    ${parseTags(firstMsg.content)}
                                </div>
                            ` : ''}
                            <div style="font-size:13px;color:#72777d;margin-top:4px;">
                                Последнее сообщение: ${lastMsg ? formatDateShort(lastMsg.createdAt) + ' от ' + escapeHtml(lastMsg.username || 'Неизвестный') : 'нет сообщений'}
                            </div>
                            ${messages.length > 1 ? `
                                <div class="msg-replies">
                                    ${msgsHtml}
                                </div>
                            ` : ''}
                            ${replyForm}
                        </div>
                    `;
                });
            }

            let sidebarHtml = `
                <div class="talk-sidebar">
                    <div class="sidebar-title">
                        <img src="${ICONS.book}" alt="Книга" style="width:16px;height:16px;filter:invert(0.3);vertical-align:middle;margin-right:4px;">
                        Узнать больше об этой странице
                    </div>
                    <a href="/article?id=${article.id}" class="sidebar-item">
                        <img src="${ICONS.article}" alt="Статья" style="width:14px;height:14px;filter:invert(0.3);vertical-align:middle;margin-right:4px;">
                        ${escapeHtml(article.title)} <span class="meta">Перейти к статье</span>
                    </a>
            `;

            db.collection('talkTopics').limit(5).get()
                .then(snapshot => {
                    const topics = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.articleId !== article.id) {
                            topics.push({ articleId: data.articleId, title: data.title || 'Статья', lastMsg: data.updatedAt || data.createdAt });
                        }
                    });
                    const sidebarContainer = document.querySelector('.talk-sidebar');
                    if (sidebarContainer) {
                        topics.forEach(t => {
                            const el = document.createElement('a');
                            el.className = 'sidebar-item';
                            el.href = '/talk?articleId=' + t.articleId;
                            const title = t.title || 'Статья';
                            el.innerHTML = `
                                <img src="${ICONS.speechBubbles}" alt="Обсуждение" style="width:14px;height:14px;filter:invert(0.3);vertical-align:middle;margin-right:4px;">
                                ${escapeHtml(title)} <span class="meta">Последнее сообщение: ${formatDateShort(t.lastMsg)}</span>
                            `;
                            sidebarContainer.appendChild(el);
                        });
                    }
                })
                .catch(() => {});

            sidebarHtml += `</div>`;

            let protectedBadge = '';
            if (isProtected) {
                protectedBadge = `<span class="talk-protected-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Обсуждение защищено</span>`;
            }

            let editBtnHtml = '';
            if (canEdit && !isProtected) {
                editBtnHtml = `
                    <div class="tool-item">
                        <a href="/add?id=${article.id}" class="edit-btn" title="Редактировать статью">
                            <img src="https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/edit.svg" alt="Редактировать">
                        </a>
                    </div>
                `;
            } else if (isProtected) {
                editBtnHtml = `
                    <div class="tool-item">
                        <a href="https://wikivnezakona.cc.cd/article?id=eHa22PK7P72LE2Th3SbB" class="edit-btn protected" title="Статья защищена">
                            <img src="https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/edit.svg" alt="Редактировать" style="opacity:0.6;">
                            <span class="lock-overlay">
                                <img src="https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/lock.svg" alt="Закрытый замок" style="width:14px;height:14px;filter:invert(0.4);">
                            </span>
                        </a>
                    </div>
                `;
            } else if (!currentUser) {
                editBtnHtml = `
                    <div class="tool-item">
                        <a href="/reg" class="edit-btn" title="Войдите чтобы редактировать">
                            <img src="https://ru.wikipedia.org/w/extensions/VisualEditor/lib/ve/lib/oojs-ui/themes/wikimediaui/images/icons/edit.svg" alt="Редактировать">
                        </a>
                    </div>
                `;
            }

            let newTopicForm = '';
            if (currentUser) {
                newTopicForm = `
                    <div class="talk-new-topic" id="newTopicForm">
                        <div class="topic-title">
                            <img src="${ICONS.add}" alt="Добавить" style="width:16px;height:16px;filter:invert(0.3);vertical-align:middle;margin-right:4px;">
                            Добавить тему
                        </div>
                        <input type="text" id="newTopicTitle" placeholder="Название темы..." maxlength="100">
                        <textarea id="newTopicContent" placeholder="Текст сообщения... (можно использовать **жирный**, *курсив*, [color=red]цвет[/color])" rows="3"></textarea>
                        <div class="topic-actions">
                            <button class="btn-submit" id="createTopicBtn">Создать тему</button>
                            <button class="btn-cancel" id="cancelTopicBtn">Отмена</button>
                        </div>
                    </div>
                `;
            } else {
                newTopicForm = `
                    <div class="talk-new-topic" style="text-align:center;padding:20px;color:#72777d;">
                        <p><a href="/login" style="color:#36c;text-decoration:none;">Войдите</a> чтобы создать новую тему</p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="talk-header">
                    <h1 class="talk-title">
                        Обсуждение: <a href="/article?id=${article.id}" class="article-link">${escapeHtml(article.title)}</a>
                        ${protectedBadge}
                    </h1>
                </div>

                <div class="talk-tabs">
                    <button class="tab"><a href="/article?id=${article.id}">Статья</a></button>
                    <button class="tab active">Обсуждение</button>
                </div>

                <div class="talk-tools">
                    <div style="font-size:13px;color:#72777d;">
                        <img src="${ICONS.speechBubbles}" alt="Темы" style="width:14px;height:14px;filter:invert(0.4);vertical-align:middle;margin-right:4px;">
                        ${allTopics.length} тем • ${totalMessages} сообщений
                        ${lastDate ? `• <img src="${ICONS.clock}" alt="Последнее" style="width:14px;height:14px;filter:invert(0.4);vertical-align:middle;margin-right:4px;"> ${formatDateShort(lastDate)} от ${escapeHtml(lastUser)}` : ''}
                    </div>
                    <div class="tool-right" style="display:flex;align-items:center;gap:8px;">
                        ${editBtnHtml}
                    </div>
                </div>

                ${sidebarHtml}

                <div class="talk-body" id="talkBody">
                    ${topicsHtml}
                </div>

                ${newTopicForm}
            `;

            document.getElementById('createTopicBtn')?.addEventListener('click', createTopic);
            document.getElementById('cancelTopicBtn')?.addEventListener('click', () => {
                document.getElementById('newTopicTitle').value = '';
                document.getElementById('newTopicContent').value = '';
            });

            document.querySelectorAll('.reply-submit').forEach(btn => {
                btn.addEventListener('click', function() {
                    const topicId = this.dataset.topicId;
                    const form = this.closest('.talk-reply-form');
                    const textarea = form.querySelector('.reply-textarea');
                    const content = textarea.value.trim();
                    if (!content) { alert('Введите текст ответа'); return; }
                    sendReply(topicId, content, form);
                });
            });

            document.querySelectorAll('.reply-cancel').forEach(btn => {
                btn.addEventListener('click', function() {
                    const form = this.closest('.talk-reply-form');
                    form.querySelector('.reply-textarea').value = '';
                });
            });

            document.querySelectorAll('.delete-msg').forEach(btn => {
                btn.addEventListener('click', function() {
                    const msgId = this.dataset.msgId;
                    if (confirm('Удалить это сообщение?')) {
                        deleteMessage(msgId);
                    }
                });
            });

            history.replaceState(null, '', '/talk?articleId=' + article.id);
        }

        // ===== СОЗДАНИЕ ТЕМЫ =====
        function createTopic() {
            if (!currentUser) { alert('Войдите в систему'); return; }
            const title = document.getElementById('newTopicTitle').value.trim();
            const content = document.getElementById('newTopicContent').value.trim();
            if (!title) { alert('Введите название темы'); return; }
            if (!content) { alert('Введите текст сообщения'); return; }

            const topicData = {
                articleId: currentArticleId,
                title: title,
                userId: currentUser.uid,        // <--- ДОБАВЛЕНО
                username: currentUsername,      // <--- ДОБАВЛЕНО
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection('talkTopics').add(topicData)
                .then(docRef => {
                    return db.collection('talkMessages').add({
                        articleId: currentArticleId,
                        topicId: docRef.id,
                        userId: currentUser.uid,
                        username: currentUsername,
                        content: content,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    document.getElementById('newTopicTitle').value = '';
                    document.getElementById('newTopicContent').value = '';
                    loadTalk(currentArticleId);
                })
                .catch(err => {
                    alert('Ошибка: ' + err.message);
                    console.error(err);
                });
        }

        // ===== ОТПРАВКА ОТВЕТА =====
        function sendReply(topicId, content, form) {
            if (!currentUser) { alert('Войдите в систему'); return; }

            db.collection('talkMessages').add({
                articleId: currentArticleId,
                topicId: topicId,
                userId: currentUser.uid,
                username: currentUsername,
                content: content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                return db.collection('talkTopics').doc(topicId).update({
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            })
            .then(() => {
                form.querySelector('.reply-textarea').value = '';
                loadTalk(currentArticleId);
            })
            .catch(err => {
                alert('Ошибка: ' + err.message);
                console.error(err);
            });
        }

        // ===== УДАЛЕНИЕ СООБЩЕНИЯ =====
        function deleteMessage(msgId) {
            if (!currentUser) { alert('Войдите в систему'); return; }

            db.collection('talkMessages').doc(msgId).get()
                .then(doc => {
                    if (!doc.exists) return;
                    const data = doc.data();
                    const isOwner = currentUser && data.userId === currentUser.uid;
                    const isAdmin = currentUserRole === 'admin';
                    if (!isOwner && !isAdmin) {
                        alert('Вы можете удалять только свои сообщения');
                        return;
                    }
                    return db.collection('talkMessages').doc(msgId).delete();
                })
                .then(() => {
                    loadTalk(currentArticleId);
                })
                .catch(err => {
                    alert('Ошибка: ' + err.message);
                    console.error(err);
                });
        }

        // === МЕНЮ ===
        randomArticleBtn.addEventListener('click', () => {
            closeMenu();
            db.collection('articles').get().then(snapshot => {
                const ids = [];
                snapshot.forEach(doc => ids.push(doc.id));
                if (ids.length === 0) { alert('Статей пока нет'); return; }
                window.location.href = '/article?id=' + ids[Math.floor(Math.random() * ids.length)];
            });
        });

        addArticleMenuBtn.addEventListener('click', () => {
            closeMenu();
            if (!currentUser) {
                alert('Войдите в систему');
                window.location.href = '/login';
                return;
            }
            window.location.href = '/add';
        });

        telegramLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.open('https://t.me/wikivnezakona', '_blank');
            closeMenu();
        });
    </script>
