        // =====================================================
        // РАСШИРЕННЫЙ parseTags — ВСЕ ТЕГИ РАБОТАЮТ
        // =====================================================
        function parseTags(text) {
            if (!text) return '';
            let html = escapeHtml(text);
            
            // Жирный
            html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            // Курсив
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
            html = html.replace(/\[italic\](.*?)\[\/italic\]/g, '<i>$1</i>');
            // Подчеркнутый
            html = html.replace(/__(.*?)__/g, '<u>$1</u>');
            // Цвет
            html = html.replace(/\[color=([^\]]+)\](.*?)\[\/color\]/g, '<span style="color:$1">$2</span>');
            // Ссылки
            html = html.replace(/\[url=([^\]]+)\](.*?)\[\/url\]/g, '<a href="$1" target="_blank" class="wiki-link">$2</a>');
            // Сноски
            html = html.replace(/\[(\d+)\]/g, '<sup class="ref">[$1]</sup>');
            
            // === Изображения [img] с поддержкой размера, выравнивания и ссылки ===
            html = html.replace(/\[img\s*(?:size=([^\s\]]+))?\s*(?:align=([^\s\]]+))?\s*(?:link=([^\s\]]+))?\](.*?)\[\/img\]/g, (match, size, align, link, url) => {
                let sizeClass = '';
                if (size === 'small') sizeClass = ' article-image-small';
                else if (size === 'medium') sizeClass = ' article-image-medium';
                else if (size === 'large') sizeClass = ' article-image-large';
                
                let alignClass = ' article-image-center';
                if (align === 'left') alignClass = ' article-image-left';
                else if (align === 'right') alignClass = ' article-image-right';
                
                let imgHtml = `<img src="${url}" class="article-image${sizeClass}${alignClass}" alt="Изображение">`;
                if (link) {
                    imgHtml = `<a href="${link}" target="_blank">${imgHtml}</a>`;
                }
                return imgHtml;
            });
            
            // Простое изображение без параметров (по центру)
            html = html.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" class="article-image article-image-center" alt="Изображение">');
            
            // === Заголовки ===
            html = html.replace(/===([^=]+)===/g, '<div style="margin:16px 0 4px 0;font-family:\'Times New Roman\',\'Linux Libertine\',Georgia,serif;font-size:20px;font-weight:400;color:#202122;">$1</div>');
            
            // === QA блоки с поддержкой тегов внутри ===
            // Цветные QA с поддержкой названий цветов и hex
            html = html.replace(/\[qa-color=([^\]]+)\](.*?)\[\/qa-color\]/gs, (match, color, content) => {
                let colorHex = color;
                const colorMap = {
                    'red': '#ff0000',
                    'blue': '#0000ff',
                    'green': '#00ff00',
                    'yellow': '#ffff00',
                    'orange': '#ff8c00',
                    'purple': '#800080',
                    'pink': '#ff69b4',
                    'cyan': '#00ffff',
                    'magenta': '#ff00ff',
                    'white': '#ffffff',
                    'black': '#000000',
                    'gray': '#808080',
                    'grey': '#808080'
                };
                if (colorMap[color.toLowerCase()]) {
                    colorHex = colorMap[color.toLowerCase()];
                }
                // Обрабатываем теги внутри QA
                const processedContent = parseTags(content);
                return `<div style="background:${colorHex}22;border-left:4px solid ${colorHex};padding:10px 14px;margin:10px 0;border-radius:2px;">${processedContent}</div>`;
            });
            
            // Обычные QA с заголовком
            html = html.replace(/\[qa="([^"]*)"\](.*?)\[\/qa\]/gs, (match, title, content) => {
                const cleanTitle = title || 'Вопрос-Ответ';
                const processedContent = parseTags(content);
                return `<div style="background:#f0f4ff;border-left:4px solid #36c;padding:10px 14px;margin:10px 0;border-radius:2px;"><strong>${escapeHtml(cleanTitle)}</strong><div>${processedContent}</div></div>`;
            });
            
            return html;
        }

                                    const imgTag = `[img size=${size} align=${align}${link ? ' link='+link : ''}]${url}[/img]`;
                                    contentArea.value = contentArea.value.substring(0, start) + imgTag + contentArea.value.substring(end);
                                    contentArea.focus();
                                    updatePreview();
                                } catch (err) {
                                    alert('Ошибка загрузки: ' + err.message);
                                }
                            };
                            fileInput.click();
                            return;
                        }
                    }
                    if (replacement) { 
                        contentArea.value = contentArea.value.substring(0, start) + replacement + contentArea.value.substring(end);
                        contentArea.focus();
                        updatePreview(); 
                    }
                });
            });

            document.getElementById('applyColorBtn').addEventListener('click', () => {
                if (isProtected) { alert('🔒 Статья защищена от редактирования'); return; }
                const color = document.getElementById('colorPicker').value; const start = contentArea.selectionStart; const end = contentArea.selectionEnd; const selected = contentArea.value.substring(start, end);
                if (start === end) contentArea.value = contentArea.value.substring(0, start) + `[color=${color}]цветной текст[/color]` + contentArea.value.substring(end);
                else contentArea.value = contentArea.value.substring(0, start) + `[color=${color}]${selected}[/color]` + contentArea.value.substring(end);
                contentArea.focus(); updatePreview();
            });

            // === INFOBOX ===
            document.getElementById('addInfoboxField').addEventListener('click', () => { if (isProtected) return; const container = document.getElementById('infoboxFields'); const template = document.getElementById('infoboxTemplate'); const clone = template.cloneNode(true); clone.style.display = 'flex'; clone.id = ''; clone.querySelectorAll('input').forEach(inp => inp.value = ''); container.appendChild(clone); attachRemoveHandler(clone); });
            document.querySelectorAll('.infobox-field:not(#infoboxTemplate)').forEach(el => attachRemoveHandler(el));
            document.getElementById('clearInfobox').addEventListener('click', () => { if (isProtected) return; document.querySelectorAll('.infobox-field:not(#infoboxTemplate)').forEach(el => el.remove()); });
            function attachRemoveHandler(el) { const btn = el.querySelector('.remove-field'); if (btn) btn.addEventListener('click', () => el.remove()); }

            // === IMAGE UPLOAD ===
            const uploadBtn = document.getElementById('uploadImageBtn'); 
            const fileInput = document.getElementById('imageFileInput'); 
            const imageInput = document.getElementById('infoboxImage'); 
            const uploadProgress = document.getElementById('uploadProgress');
            
            uploadBtn.addEventListener('click', () => { if (isProtected) return; fileInput.click(); });
            fileInput.addEventListener('change', async (e) => {
                if (isProtected) return;
                const file = e.target.files[0]; 
                if (!file) return; 
                uploadProgress.classList.add('active'); 
                uploadProgress.textContent = 'Загрузка...'; 
                uploadBtn.disabled = true;
                try { 
                    const url = await uploadToImgbb(file); 
                    imageInput.value = url; 
                    uploadProgress.textContent = 'Загружено!'; 
                    uploadProgress.style.color = '#2a8';
                    setTimeout(() => { uploadProgress.classList.remove('active'); uploadProgress.style.color = '#36c'; }, 3000); 
                    updatePreview(); 
                }
                catch (err) { 
                    uploadProgress.textContent = 'Ошибка: ' + err.message; 
                    uploadProgress.style.color = '#d33'; 
                    setTimeout(() => { uploadProgress.classList.remove('active'); uploadProgress.style.color = '#36c'; }, 4000); 
                }
                finally { uploadBtn.disabled = false; fileInput.value = ''; }
            });

            // === BRANCHES ===
            document.getElementById('addBranchBtn').addEventListener('click', () => {
                if (isProtected) return;
                const container = document.getElementById('branchesContainer'); const existing = container.querySelectorAll('.branch-item:not(#branchTemplate)');
                if (existing.length >= 10) { alert('Максимум 10 веток'); return; }
                const template = document.getElementById('branchTemplate'); const clone = template.cloneNode(true); clone.style.display = 'block'; clone.id = ''; clone.querySelectorAll('input, textarea').forEach(el => el.value = ''); container.appendChild(clone); attachBranchRemove(clone); updatePreview();
            });
            document.querySelectorAll('.branch-item:not(#branchTemplate)').forEach(el => attachBranchRemove(el));
            document.getElementById('clearBranchesBtn').addEventListener('click', () => { if (isProtected) return; document.querySelectorAll('.branch-item:not(#branchTemplate)').forEach(el => el.remove()); updatePreview(); });
            function attachBranchRemove(el) { const btn = el.querySelector('.remove-branch'); if (btn) btn.addEventListener('click', () => { el.remove(); updatePreview(); }); el.querySelectorAll('input, textarea').forEach(inp => inp.addEventListener('input', updatePreview)); }

            // === PREVIEW ===
            const titleInput = document.getElementById('articleTitle');
            const contentInput = document.getElementById('articleContent');
            const afterInput = document.getElementById('afterContent');
            const preview = document.getElementById('previewContent');

            function updatePreview() {
                let previewHtml = parseTags(contentInput.value || '');
                previewHtml = previewHtml.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');

                const infoboxTitle = document.getElementById('infoboxTitle').value.trim() || 'Инфобокс';
                const infoboxImage = document.getElementById('infoboxImage').value.trim();
                const infoboxBgColor = document.getElementById('infoboxBgColor').value || '#0033cc';
                const r = parseInt(infoboxBgColor.slice(1,3), 16);
                const g = parseInt(infoboxBgColor.slice(3,5), 16);
                const b = parseInt(infoboxBgColor.slice(5,7), 16);
                const bgRgba = `rgba(${r}, ${g}, ${b}, 0.12)`;

                let fieldsHtml = '';
                document.querySelectorAll('.infobox-field:not(#infoboxTemplate)').forEach(el => {
                    const key = el.querySelector('.infobox-key')?.value || '';
                    const value = el.querySelector('.infobox-value')?.value || '';
                    if (key) {
                        const parsedKey = parseTags(key);
                        const parsedValue = parseTags(value);
                        fieldsHtml += `<div class="preview-infobox-row"><span class="key">${parsedKey}</span><span>${parsedValue}</span></div>`;
                    }
                });

                let infoboxPreview = '';
                if (fieldsHtml || infoboxImage) {
                    const parsedTitle = parseTags(infoboxTitle);
                    infoboxPreview = `<div class="preview-infobox"><div class="preview-infobox-title" style="background:${bgRgba};">${parsedTitle}</div>${infoboxImage ? `<img src="${escapeHtml(infoboxImage)}" class="preview-infobox-img" alt="Изображение">` : ''}${fieldsHtml}</div>`;
                }

                let branchesHtml = '';
                document.querySelectorAll('.branch-item:not(#branchTemplate)').forEach(el => {
                    const title = el.querySelector('.branch-title-input')?.value || '';
                    const content = el.querySelector('.branch-content-input')?.value || '';
                    if (title || content) {
                        const parsedTitle = parseTags(title);
                        const parsedContent = parseTags(content);
                        branchesHtml += `
                            <div class="preview-branch">
                                <div class="branch-toggle" onclick="const body=this.nextElementSibling; const icon=this.querySelector('.arrow-icon'); if(body.style.display==='block'){body.style.display='none'; icon.classList.remove('open'); icon.classList.add('closed');}else{body.style.display='block'; icon.classList.remove('closed'); icon.classList.add('open');}">
                                    <img src="${ARROW_SVG}" class="arrow-icon closed" alt="v">
                                    <span>${parsedTitle}</span>
                                </div>
                                <div class="branch-body">
                                    <p>${parsedContent}</p>
                                </div>
                            </div>
                        `;
                    }
                });

                const afterText = afterInput.value || '';
                let afterHtml = afterText ? `<p>${parseTags(afterText)}</p>` : '';

                preview.innerHTML = previewHtml + infoboxPreview + afterHtml + branchesHtml || '<span style="color:#72777d;">Предпросмотр будет здесь...</span>';
            }

            if (titleInput) titleInput.addEventListener('input', updatePreview);
            contentInput.addEventListener('input', updatePreview);
            afterInput.addEventListener('input', updatePreview);
            document.querySelectorAll('#infoboxFields input').forEach(inp => inp.addEventListener('input', updatePreview));
            document.getElementById('infoboxTitle').addEventListener('input', updatePreview);
            document.getElementById('infoboxImage').addEventListener('input', updatePreview);
            document.getElementById('infoboxBgColor').addEventListener('input', updatePreview);
            setTimeout(updatePreview, 200);

            document.getElementById('articleForm').addEventListener('submit', (e) => { e.preventDefault(); if (isProtected) { showStatus('🔒 Статья защищена от редактирования', 'error'); return; } saveArticle(); });
            document.getElementById('cancelBtn').addEventListener('click', () => { if (isEditMode && editArticleId) window.location.href = '/article?id=' + editArticleId; else window.location.href = '/'; });
            if (isEditMode) document.getElementById('deleteBtn')?.addEventListener('click', () => { if (confirm('Удалить статью?')) deleteArticle(); });
            
            document.getElementById('toggleProtectBtn')?.addEventListener('click', () => {
                if (!isAdmin) { alert('Только администраторы могут защищать статьи'); return; }
                const newProtected = !isProtected;
                if (confirm(newProtected ? 'Защитить статью от редактирования?' : 'Снять защиту со статьи?')) {
                    db.collection('articles').doc(editArticleId).update({
                        protected: newProtected,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert(newProtected ? '🔒 Статья защищена!' : '🔓 Защита снята!');
                        window.location.reload();
                    }).catch(err => alert('Ошибка: ' + err.message));
                }
            });
        }

        // ===== СОХРАНЕНИЕ В ИСТОРИЮ =====
        function saveToHistory(articleId, data, action, userId, username) {
            return db.collection('articleHistory').add({
                articleId: articleId,
                userId: userId || 'unknown',
                username: username || 'Неизвестный',
                action: action || 'edit',
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                data: {
                    title: data.title,
                    content: data.content,
                    afterContent: data.afterContent || '',
                    infobox: data.infobox || { title: 'Инфобокс', fields: {}, image: '', bgColor: 'rgba(0, 30, 100, 0.12)' },
                    branches: data.branches || []
                }
            }).catch(err => console.error('Ошибка сохранения истории:', err));
        }

        function saveArticle() {
            const status = document.getElementById('formStatus'); 
            status.className = 'form-status'; 
            status.style.display = 'none';
            
            if (!currentUser) { 
                showStatus('❌ Войдите в систему', 'error'); 
                return; 
            }
            
            const titleInput = document.getElementById('articleTitle');
            const title = titleInput ? titleInput.value.trim() : (existingArticleData?.title || '');
            const content = document.getElementById('articleContent').value.trim();
            
            if (!title) { 
                showStatus('❌ Введите название статьи', 'error'); 
                return; 
            }
            if (!content) { 
                showStatus('❌ Введите содержание статьи', 'error'); 
                return; 
            }

            const infoboxTitle = document.getElementById('infoboxTitle').value.trim() || 'Инфобокс';
            const infoboxImage = document.getElementById('infoboxImage').value.trim();
            const infoboxBgColor = document.getElementById('infoboxBgColor').value || '#0033cc';
            const fields = {};
            document.querySelectorAll('.infobox-field:not(#infoboxTemplate)').forEach(el => {
                const key = el.querySelector('.infobox-key')?.value || ''; 
                const value = el.querySelector('.infobox-value')?.value || '';
                if (key) fields[key] = value;
            });
            const afterContent = document.getElementById('afterContent').value.trim();

            const branches = [];
            document.querySelectorAll('.branch-item:not(#branchTemplate)').forEach(el => {
                const title = el.querySelector('.branch-title-input')?.value || ''; 
                const content = el.querySelector('.branch-content-input')?.value || '';
                if (title || content) branches.push({ title, content });
            });

            const articleData = {
                title, content, afterContent,
                infobox: { title: infoboxTitle, fields, image: infoboxImage, bgColor: infoboxBgColor },
                branches
            };

            if (isEditMode && editArticleId) {
                const updateData = {
                    title: articleData.title,
                    content: articleData.content,
                    afterContent: articleData.afterContent,
                    infobox: articleData.infobox,
                    branches: articleData.branches,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                console.log('📝 Обновление статьи:', { id: editArticleId, updateData });
                
                db.collection('articles').doc(editArticleId).update(updateData)
                    .then(() => {
                        return saveToHistory(editArticleId, articleData, 'edit', currentUser.uid, currentUsername);
                    })
                    .then(() => {
                        db.collection('logs').add({
                            action: 'edit',
                            articleId: editArticleId,
                            title: articleData.title,
                            userId: currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        showStatus('✅ Статья обновлена!', 'success');
                        setTimeout(() => window.location.href = '/article?id=' + editArticleId, 1200);
                    })
                    .catch(err => {
                        console.error('❌ Ошибка сохранения:', err);
                        showStatus('❌ Ошибка: ' + err.message, 'error');
                    });
            } else {
                const newRef = db.collection('articles').doc();
                const newArticleData = {
                    ...articleData,
                    articleId: newRef.id,
                    authorId: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    protected: false
                };
                
                console.log('📝 Создание новой статьи:', { id: newRef.id, newArticleData });
                
                newRef.set(newArticleData)
                    .then(() => {
                        return saveToHistory(newRef.id, articleData, 'create', currentUser.uid, currentUsername);
                    })
                    .then(() => {
                        db.collection('logs').add({
                            action: 'create',
                            articleId: newRef.id,
                            title: articleData.title,
                            userId: currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        showStatus('✅ Статья создана!', 'success');
                        setTimeout(() => window.location.href = '/article?id=' + newRef.id, 1200);
                    })
                    .catch(err => {
                        console.error('❌ Ошибка создания:', err);
                        showStatus('❌ Ошибка: ' + err.message, 'error');
                    });
            }
        }

        function showStatus(msg, type) { 
            const status = document.getElementById('formStatus'); 
            status.textContent = msg; 
            status.className = 'form-status ' + type; 
            status.style.display = 'block'; 
        }
        
        function deleteArticle() {
            if (!currentUser || currentUserRole !== 'admin') { 
                alert('❌ Только администраторы могут удалять статьи'); 
                return; 
            }
            if (!editArticleId) return;
            db.collection('articles').doc(editArticleId).get().then(doc => {
                if (!doc.exists) return; 
                const data = doc.data();
                return db.collection('deletedArticles').doc(editArticleId).set({
                    title: data.title, content: data.content, infobox: data.infobox || null,
                    deletedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    deletedBy: currentUser.uid,
                    originalAuthor: data.authorId || 'unknown'
                }).then(() => db.collection('articles').doc(editArticleId).delete()).then(() => {
                    db.collection('logs').add({
                        action: 'delete',
                        articleId: editArticleId,
                        title: data.title,
                        userId: currentUser.uid,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert('🗑️ Статья удалена');
                    window.location.href = '/';
                });
            }).catch(err => alert('❌ Ошибка: ' + err.message));
        }

        if (!auth.currentUser) {
            container.innerHTML = `<div class="auth-warning"><h2>Требуется авторизация</h2><p><a href="/login">Войдите</a> для создания статьи</p></div>`;
        }
    </script>
</body>
</html>
